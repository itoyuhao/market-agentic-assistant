# Market Agent Watchlist
# yfinance tickers. Taiwan stocks use .TW suffix (or .TWO for OTC).
#
# news_query (optional): string passed to NewsAPI /everything. Omit for tickers
# where per-name news is not useful (broad ETFs, index funds). The daily news
# fetcher skips any entry without a news_query.

us:
  - ticker: VOO
    name: Vanguard S&P 500 ETF
    category: index_etf
    notes: 美股大盤代表
    # news_query omitted — S&P 500 news is too broad to filter usefully per-ticker

  - ticker: QQQ
    name: Invesco Nasdaq 100 ETF
    category: index_etf
    notes: 科技股大盤代表
    # news_query omitted — same reason

  - ticker: NVDA
    name: NVIDIA
    category: semiconductor
    notes: AI 晶片龍頭
    news_query: NVIDIA

  - ticker: TSLA
    name: Tesla
    category: ev_tech
    notes: 電動車 / AI / 能源
    news_query: Tesla

  - ticker: WY
    name: Weyerhaeuser
    category: reit_timber
    notes: 林業 REIT，與房市/利率高度相關
    news_query: Weyerhaeuser

  - ticker: INTC
    name: Intel
    category: semiconductor
    notes: 老牌半導體，轉型中
    news_query: Intel

  - ticker: ARM
    name: Arm Holdings
    category: semiconductor
    notes: IP 授權模式半導體
    news_query: Arm Holdings

  # ---- 2026-04 新增（游庭皓 8 集逐字稿頻率分析）-------------------------------
  - ticker: DIA
    name: SPDR Dow Jones Industrial Average ETF
    category: index_etf
    notes: 道瓊指數代表（游庭皓每集 routine 點名）
    # news_query omitted — broad index ETF

  - ticker: SOXX
    name: iShares Semiconductor ETF
    category: semiconductor_etf
    notes: 費城半導體指數代表（游庭皓每集 routine 點名；2026-04 連 17 紅）
    # news_query omitted — sector ETF

  # ---- 2026-04-26 新增 -------------------------------------------------------
  - ticker: ORCL
    name: Oracle
    category: enterprise_software
    notes: 企業軟體 / 雲端基礎設施（OCI）/ 資料庫龍頭
    news_query: Oracle

tw:
  - ticker: "^TWII"
    name: 台股加權指數
    category: index
    notes: 台股大盤指數本身（vs 0050 是追蹤前 50 大的 ETF；游庭皓報數時用 ^TWII 點數）
    # news_query omitted — index

  - ticker: "0050.TW"
    name: 元大台灣50 ETF
    category: index_etf
    notes: 台股大盤代表
    # news_query omitted — ETF

  - ticker: "2330.TW"
    name: 台積電
    category: semiconductor
    notes: 晶圓代工龍頭
    news_query: TSMC

  - ticker: "2454.TW"
    name: 聯發科
    category: semiconductor
    notes: IC 設計龍頭
    news_query: MediaTek

  # ---- 2026-04-26 新增：日本 ETF 持倉（持有部位、必須追蹤）-------------------
  # 兩檔均為台灣上市、底層持有日股的主動式 ETF。報酬 = 日股表現 × USD/JPY × USD/TWD。
  # USD/JPY 變動的解讀請對照 macro_indicators.yaml 的 DEXJPUS。

  - ticker: "00955.TWO"
    name: 中信日本商社 ETF (CTBC Japan Commercial and Wholesale Trade)
    category: japan_etf
    notes: 追蹤 NYSE FactSet Japan Commercial and Wholesale Index；持股以日本五大商社（三井/伊藤忠/丸紅/三菱商事/住友商事）為主；自有持倉。注意：上櫃標的、ticker 後綴是 .TWO 不是 .TW

  - ticker: "00951.TW"
    name: 台新日本半導體 ETF
    category: japan_etf
    notes: 追蹤 NYSE FactSet Japan Semiconductor Index；2024-07 上市、全台首檔日本半導體 ETF；自有持倉
